    <path d="M280 24V296" stroke="white" stroke-width="1"/>
    <path d="M360 24V296" stroke="white" stroke-width="1"/>
    <path d="M440 24V296" stroke="white" stroke-width="1"/>
    <path d="M520 24V296" stroke="white" stroke-width="1"/>
    <path d="M600 24V296" stroke="white" stroke-width="1"/>
    <path d="M680 24V296" stroke="white" stroke-width="1"/>
    <path d="M760 24V296" stroke="white" stroke-width="1"/>
    <path d="M840 24V296" stroke="white" stroke-width="1"/>
    <path d="M920 24V296" stroke="white" stroke-width="1"/>
    <path d="M1000 24V296" stroke="white" stroke-width="1"/>
    <path d="M1080 24V296" stroke="white" stroke-width="1"/>
    <path d="M1160 24V296" stroke="white" stroke-width="1"/>
  </g>

  <!-- left chip layout geometry -->
  <g opacity="0.92">
    <rect x="72" y="58" width="130" height="34" rx="8" fill="none" stroke="url(#lineA)" stroke-width="3"/>
    <rect x="92" y="108" width="92" height="30" rx="7" fill="none" stroke="url(#lineA)" stroke-width="3"/>
    <rect x="72" y="156" width="150" height="40" rx="8" fill="none" stroke="url(#lineA)" stroke-width="3"/>
    <rect x="132" y="214" width="90" height="28" rx="7" fill="none" stroke="url(#lineA)" stroke-width="3"/>
    <path d="M202 75H252V125H310" stroke="url(#lineA)" stroke-width="3" stroke-linecap="round"/>
    <path d="M184 123H250V177H330" stroke="url(#lineA)" stroke-width="3" stroke-linecap="round"/>
    <path d="M222 176H274V228H330" stroke="url(#lineA)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="252" cy="125" r="5" fill="#8BE9FD"/>
    <circle cx="250" cy="177" r="5" fill="#8BE9FD"/>
    <circle cx="274" cy="228" r="5" fill="#A6E22E"/>
  </g>

  <!-- right multimodal graph -->
  <g opacity="0.95">
    <circle cx="1048" cy="82" r="18" fill="#0F1730" stroke="#8BE9FD" stroke-width="3"/>
    <circle cx="1128" cy="128" r="18" fill="#0F1730" stroke="#A6E22E" stroke-width="3"/>
    <circle cx="1040" cy="176" r="18" fill="#0F1730" stroke="#8BE9FD" stroke-width="3"/>
    <circle cx="1142" cy="210" r="18" fill="#0F1730" stroke="#A6E22E" stroke-width="3"/>
