    <path d="M1066 91L1110 121" stroke="url(#lineA)" stroke-width="3"/>
    <path d="M1112 136L1058 169" stroke="url(#lineA)" stroke-width="3"/>
    <path d="M1055 191L1124 205" stroke="url(#lineA)" stroke-width="3"/>
    <path d="M998 226L1022 191" stroke="url(#lineA)" stroke-width="3"/>
    <path d="M996 148L994 208" stroke="url(#lineA)" stroke-width="3"/>
  </g>

  <!-- center bridge -->
  <g filter="url(#glow)">
    <path d="M380 160H900" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 12"/>
    <circle cx="474" cy="160" r="6" fill="#8BE9FD"/>
    <circle cx="640" cy="160" r="6" fill="#A6E22E"/>
    <circle cx="806" cy="160" r="6" fill="#8BE9FD"/>
  </g>

  <!-- title -->
  <text x="394" y="124" fill="white" font-size="36" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    Xia Ye · Lucid X
  </text>
  <text x="394" y="164" fill="#C7D2FE" font-size="20" font-family="Arial, Helvetica, sans-serif" font-weight="500">
