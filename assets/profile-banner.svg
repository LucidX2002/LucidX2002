<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="45%" stop-color="#111A32"/>
      <stop offset="100%" stop-color="#1D2B52"/>
    </linearGradient>
    <linearGradient id="lineA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66D9EF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#A6E22E" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8BE9FD"/>
      <stop offset="100%" stop-color="#9BE564"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="320" rx="28" fill="url(#bg)"/>

  <!-- background grid -->
  <g opacity="0.11">
    <path d="M80 40H1200" stroke="white" stroke-width="1"/>
